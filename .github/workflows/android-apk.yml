name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: "8.8"

      - name: Build debug APK
        run: |
          set -o pipefail
          gradle assembleDebug --stacktrace --info --console=plain 2>&1 | tee gradle-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spendsentry-build-log
          path: gradle-build.log
          if-no-files-found: error

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: spendsentry-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
